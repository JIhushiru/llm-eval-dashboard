# Alembic config for the EvalForge backend (CLI use, e.g. `alembic upgrade head`
# or `alembic revision --autogenerate -m "..."`). The application's programmatic
# startup path (app.database.run_migrations) sets script_location and the DB URL
# itself and does not read this file — so the sqlalchemy.url below is only a
# fallback; env.py prefers EVALFORGE_DB_PATH from the app settings.

[alembic]
script_location = migrations
prepend_sys_path = .
sqlalchemy.url = sqlite:///./evalforge.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
